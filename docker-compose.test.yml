name: deckel-test

services:
  app:
    build:
      context: .
      dockerfile: test/Dockerfile.cover
    environment:
      DECKEL_DATABASE_URL: "postgres://deckel:deckel@postgres:5432/deckel_test?sslmode=disable"
      DECKEL_LISTEN_ADDR: ":8080"
      DECKEL_ADMIN_GROUP: "role:admin"
      DECKEL_STATIC_DIR: "/app/static"
      DECKEL_TEMPLATE_DIR: "/app/templates"
      DECKEL_ORGANIZATION: "K4-Bar"
      DECKEL_APP_NAME: "Deckel"
      GOCOVERDIR: "/coverage"
    volumes:
      - ./coverage:/coverage
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: deckel
      POSTGRES_PASSWORD: deckel
      POSTGRES_DB: deckel_test
    volumes:
      - ./test/seed.sql:/seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deckel -d deckel_test"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: "8181"
      KC_HTTP_PORT: "8181"
      KC_HEALTH_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    volumes:
      - ./test/deckel-test-realm.json:/opt/keycloak/data/import/deckel-test-realm.json:ro
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && timeout 2 cat <&3 | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    extra_hosts:
      - "localhost:host-gateway"
    command:
      - --provider=keycloak-oidc
      - --client-id=deckel
      - --client-secret=test-client-secret
      - --oidc-issuer-url=http://localhost:8181/realms/deckel-test
      - --redirect-url=http://localhost:4181/oauth2/callback
      - --upstream=http://app:8080
      - --http-address=0.0.0.0:4181
      - --cookie-secret=super-secret-32-character-string
      - --cookie-secure=false
      - --pass-user-headers=true
      - --pass-access-token=true
      - --set-xauthrequest=true
      - --email-domain=*
      - --skip-provider-button=true
      - --backend-logout-url=http://localhost:8181/realms/deckel-test/protocol/openid-connect/logout?id_token_hint={id_token}
    ports:
      - "4181:4181"
    depends_on:
      keycloak:
        condition: service_healthy
      app:
        condition: service_healthy
