{{define "order-success"}}
<div class="modal modal-open" onclick="if(event.target===this){this.parentElement.style.display='none';this.parentElement.innerHTML='';}">
    <div class="fixed inset-0 z-50 flex items-center justify-center" style="background:{{if .Warning}}rgba(220,160,0,0.95){{else}}rgba(0,170,80,0.95){{end}}">
        <div class="flex flex-col items-center gap-4 px-6 text-center" style="color:#fff">
            {{if .Warning}}
            <svg xmlns="http://www.w3.org/2000/svg" class="h-24 w-24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
            </svg>
            {{else}}
            <svg xmlns="http://www.w3.org/2000/svg" class="h-24 w-24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
            {{end}}
            <p class="text-2xl font-bold">{{.Title}}</p>
            <p class="text-lg opacity-90">{{.Subtitle}}</p>
            <p class="text-3xl font-extrabold">{{formatCents .TotalAmount}}</p>
            {{if .Warning}}
            <p class="text-lg font-semibold mt-2">Ausgabelimit erreicht — bitte bald einzahlen!</p>
            {{end}}
            <button class="btn btn-outline btn-lg mt-4" style="color:#fff;border-color:#fff"
                onclick="var m=document.getElementById('modal');m.style.display='none';m.innerHTML='';">
                OK
            </button>
        </div>
    </div>
</div>
<script>document.getElementById('modal').style.display='';</script>
{{end}}
