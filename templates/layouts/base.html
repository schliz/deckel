{{define "layout"}}<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{.CSRFToken}}">
    <title>{{orgName}} {{appName}}</title>
    <script>
        (function() {
            var theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'business2' : 'corporate2');
            document.documentElement.setAttribute('data-theme', theme);
            document.addEventListener('DOMContentLoaded', function() {
                if (theme === 'business2') {
                    document.getElementById('theme-icon-moon').classList.add('hidden');
                    document.getElementById('theme-icon-sun').classList.remove('hidden');
                }
            });
        })();
        function toggleTheme() {
            var current = document.documentElement.getAttribute('data-theme');
            var next = current === 'business2' ? 'corporate2' : 'business2';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            document.getElementById('theme-icon-sun').classList.toggle('hidden');
            document.getElementById('theme-icon-moon').classList.toggle('hidden');
        }
    </script>
    <link rel="stylesheet" href="{{cssFile}}">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1f2937">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <script src="/static/js/htmx.min.js"></script>
</head>
<body class="min-h-screen bg-base-100">
    {{block "nav" .}}{{end}}

    {{if .LowBalanceWarning}}
    <div class="alert alert-warning rounded-none">
        <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
        <span>Dein Guthaben ist niedrig! Bitte zahle beim Barabend ein.</span>
    </div>
    {{end}}

    <div id="header-stats" hx-get="/header-stats" hx-trigger="load" hx-swap="outerHTML"></div>

    <main class="container mx-auto px-4 py-6">
        {{block "content" .}}{{end}}
    </main>

    <div id="modal" style="display:none"></div>

    <div id="toast-zone" class="toast toast-end toast-top z-50"></div>

    <script>
        document.body.addEventListener('htmx:configRequest', function(event) {
            var token = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
            event.detail.headers['X-CSRF-Token'] = token;
        });
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>{{end}}
