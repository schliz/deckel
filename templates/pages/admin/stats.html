{{define "content"}}
<div class="space-y-6">
    <h1 class="text-2xl font-bold">Statistiken</h1>

    <!-- Time range filters -->
    <div class="card bg-base-200 shadow-sm">
        <div class="card-body p-4 space-y-4">
            <h2 class="card-title text-lg">Zeitraum</h2>

            <!-- Preset buttons -->
            <div class="flex flex-wrap gap-2" id="stats-presets">
                <button type="button" class="btn btn-sm btn-outline" onclick="applyPreset('today', this)">Heute</button>
                <button type="button" class="btn btn-sm btn-outline" onclick="applyPreset('week', this)">Letzte Woche</button>
                <button type="button" class="btn btn-sm btn-outline" onclick="applyPreset('month', this)">Letzter Monat</button>
            </div>

            <!-- Custom date range -->
            <form class="flex flex-wrap gap-2 items-end"
                hx-get="/admin/stats"
                hx-target="#admin-stats-panel"
                hx-swap="innerHTML">
                <fieldset class="fieldset">
                    <label class="label">Von</label>
                    <input type="date" name="from" value="{{.From}}" class="input input-sm">
                </fieldset>
                <fieldset class="fieldset">
                    <label class="label">Bis</label>
                    <input type="date" name="to" value="{{.To}}" class="input input-sm">
                </fieldset>
                <fieldset class="fieldset">
                    <button type="submit" class="btn btn-primary btn-sm" hx-indicator="#stats-loading">Filtern</button>
                </fieldset>
            </form>
        </div>
    </div>

    <!-- Stats panel -->
    <div class="relative">
        <span id="stats-loading" class="htmx-indicator loading loading-spinner loading-md absolute top-4 right-4"></span>
        <div id="admin-stats-panel">
            {{template "admin-stats-panel" .}}
        </div>
    </div>
</div>

<script>
function toDateStr(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function applyPreset(preset, btn) {
    var now = new Date();
    var from, to;
    var tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);

    switch (preset) {
        case 'today':
            from = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            to = tomorrow;
            break;
        case 'week':
            from = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 7);
            to = tomorrow;
            break;
        case 'month':
            from = new Date(now.getFullYear(), now.getMonth() - 1, now.getDate());
            to = tomorrow;
            break;
    }

    var fromInput = document.querySelector('input[name="from"]');
    var toInput = document.querySelector('input[name="to"]');
    if (fromInput) fromInput.value = toDateStr(from);
    if (toInput) toInput.value = toDateStr(to);

    // Highlight active preset button
    document.querySelectorAll('#stats-presets button').forEach(function(b) {
        b.classList.remove('btn-active');
    });
    btn.classList.add('btn-active');

    // Trigger the form's HTMX request
    var form = document.querySelector('form[hx-get="/admin/stats"]');
    if (form) htmx.trigger(form, 'submit');
}
</script>
{{end}}
