{{define "content"}}
<div class="space-y-6">
    <div class="flex items-center gap-4">
        <a href="/admin/menu" class="btn btn-ghost btn-sm">&larr; Zurück</a>
        <h1 class="text-2xl font-bold">CSV Stapelbearbeitung</h1>
    </div>

    <!-- Steps indicator -->
    <ul class="steps steps-horizontal w-full" id="menu-batch-steps">
        <li class="step step-primary" data-content="1">Export</li>
        <li class="step step-primary" data-content="2">Hochladen</li>
        <li class="step" data-content="3">Vorschau</li>
        <li class="step" data-content="4">Ergebnis</li>
    </ul>

    <!-- Wizard content area -->
    <div id="menu-batch-content">
        {{template "menu-batch-export-upload" .}}
    </div>
</div>
{{end}}
