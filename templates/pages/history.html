{{define "content"}}
<div class="flex items-center justify-between mb-4">
    <h1 class="text-2xl font-bold">Transaktionen</h1>
    {{if .IsBlocked}}
    <button class="btn btn-primary btn-sm btn-disabled" disabled>
        Eigene Buchung
    </button>
    {{else}}
    <button class="btn btn-primary btn-sm"
        hx-get="/transactions/custom"
        hx-target="#modal">
        Eigene Buchung
    </button>
    {{end}}
</div>

<div id="transaction-list">
    {{template "transaction-list" .}}
</div>
{{end}}
