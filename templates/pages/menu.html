{{define "content"}}
<h1 class="text-2xl font-bold mb-4">Getränkekarte</h1>
<div id="menu-categories">
  {{range .Categories}}
  <div class="mb-6">
    <h2 class="text-xl font-semibold mb-2">{{.Category.Name}}</h2>
    {{range .Items}}
    <div class="card bg-base-200 mb-2 p-3">
      <span>{{.Name}}</span>
    </div>
    {{end}}
  </div>
  {{end}}
</div>
{{end}}
