{{define "content"}}
<div class="space-y-6">
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold">Getränkekarte verwalten</h1>
        <a href="/admin/menu/csv" class="btn btn-outline btn-sm">CSV Stapelbearbeitung</a>
    </div>

    <!-- Add new category form -->
    <div class="card bg-base-200 shadow-sm">
        <div class="card-body p-4">
            <h2 class="card-title text-lg">Neue Kategorie</h2>
            <form class="flex gap-2 items-end"
                hx-post="/admin/categories"
                hx-target="#admin-category-list"
                hx-swap="innerHTML">
                <fieldset class="fieldset flex-1">
                    <input type="text" name="name" placeholder="Kategoriename"
                        class="input input-sm w-full" required>
                </fieldset>
                <fieldset class="fieldset">
                    <button type="submit" class="btn btn-primary btn-sm">Hinzufügen</button>
                </fieldset>
            </form>
        </div>
    </div>

    <!-- Category list -->
    <div id="admin-category-list">
        {{template "admin-category-list" .}}
    </div>
</div>
{{end}}
