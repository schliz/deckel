{{define "custom-transaction-modal"}}
<div class="modal modal-open" onclick="if(event.target===this){this.parentElement.style.display='none';this.remove();}">
    <div class="modal-box">
        <h3 class="font-bold text-lg">Eigene Buchung</h3>

        {{if .ErrorMessage}}
        <div class="alert alert-error mt-3">
            <span>{{.ErrorMessage}}</span>
        </div>
        {{end}}

        <div class="py-4">
            <fieldset class="fieldset mb-4">
                <label class="label">Beschreibung *</label>
                <input type="text" id="custom-tx-description" placeholder="z.B. Snacks, Einkauf..."
                    class="input w-full" required>
            </fieldset>

            <fieldset class="fieldset mb-4">
                <label class="label">Betrag (EUR)</label>
                <input type="text" inputmode="decimal" id="custom-tx-amount" pattern="[0-9]+([,.][0-9]{1,2})?"
                    placeholder="0,00" class="input w-full">
                <p class="text-xs text-base-content/60 mt-1">Min: {{formatCents .Settings.CustomTxMin}} / Max: {{formatCents .Settings.CustomTxMax}}</p>
            </fieldset>
        </div>

        <div class="modal-action">
            <button class="btn btn-ghost" onclick="this.closest('.modal').parentElement.style.display='none';this.closest('.modal').remove();">Abbrechen</button>
            <button class="btn btn-primary" id="custom-tx-confirm-btn"
                hx-post="/transactions/custom"
                hx-vals='js:{"description": document.getElementById("custom-tx-description").value, "amount": document.getElementById("custom-tx-amount").value}'
                hx-target="#modal"
                hx-headers='{"X-CSRF-Token": "{{.CSRFToken}}"}'>
                Buchen
            </button>
        </div>
    </div>
</div>

<script>
(function() {
    document.getElementById('modal').style.display = '';
})();
</script>
{{end}}
