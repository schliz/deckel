{{define "user-row"}}
<tr id="user-row-{{.ID}}">
    <td>{{.FullName}}</td>
    <td>{{.Email}}</td>
    <td class="text-right {{if lt .Balance 0}}text-error{{else}}text-success{{end}}">
        {{formatCents .Balance}}
    </td>
    <td>
        <label class="label cursor-pointer gap-2 justify-start p-0">
            <input type="checkbox" class="toggle toggle-sm toggle-primary"
                {{if .IsBarteamer}}checked{{end}}
                hx-post="/admin/users/{{.ID}}/toggle-barteamer"
                hx-target="#user-row-{{.ID}}"
                hx-swap="outerHTML">
            <span class="label-text text-xs">{{if .IsBarteamer}}Barteamer{{else}}Helfer{{end}}</span>
        </label>
    </td>
    <td>
        <label class="label cursor-pointer gap-2 justify-start p-0">
            <input type="checkbox" class="toggle toggle-sm toggle-success"
                {{if .IsActive}}checked{{end}}
                hx-post="/admin/users/{{.ID}}/toggle-active"
                hx-target="#user-row-{{.ID}}"
                hx-swap="outerHTML">
            <span class="label-text text-xs">{{if .IsActive}}Aktiv{{else}}Inaktiv{{end}}</span>
        </label>
    </td>
    <td>
        <label class="label cursor-pointer gap-2 justify-start p-0">
            <input type="checkbox" class="toggle toggle-sm toggle-warning"
                {{if .SpendingLimitDisabled}}checked{{end}}
                hx-post="/admin/users/{{.ID}}/toggle-spending-limit"
                hx-target="#user-row-{{.ID}}"
                hx-swap="outerHTML">
            <span class="label-text text-xs">{{if .SpendingLimitDisabled}}Aufgehoben{{else}}Aktiv{{end}}</span>
        </label>
    </td>
    <td>
        <button class="btn btn-primary btn-xs"
            hx-get="/admin/users/{{.ID}}/deposit"
            hx-target="#modal">Einzahlung</button>
    </td>
</tr>
{{end}}
