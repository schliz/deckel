{{define "user-row"}}
{{$u := .User}}
{{$isSelf := eq $u.ID .CurrentUserID}}
<tr id="user-row-{{$u.ID}}"{{if .OOB}} hx-swap-oob="outerHTML"{{end}}>
    <td>{{$u.FullName}}{{if $u.IsAdmin}} <span class="badge badge-info badge-sm">Admin</span>{{end}}</td>
    <td>{{$u.Email}}</td>
    <td class="text-right {{if lt $u.Balance 0}}text-error{{else}}text-success{{end}}">
        {{formatCents $u.Balance}}
    </td>
    <td>
        <label class="label cursor-pointer gap-2 justify-start p-0">
            <input type="checkbox" class="toggle toggle-sm toggle-primary"
                {{if $u.IsBarteamer}}checked{{end}}
                hx-get="/admin/users/{{$u.ID}}/confirm-toggle?action=barteamer"
                hx-target="#modal"
                hx-trigger="click"
                onclick="event.preventDefault()">
            <span class="text-xs">{{if $u.IsBarteamer}}Barteamer{{else}}Helfer{{end}}</span>
        </label>
    </td>
    <td>
        <label class="label cursor-pointer gap-2 justify-start p-0">
            <input type="checkbox" class="toggle toggle-sm toggle-success"
                {{if $u.IsActive}}checked{{end}}
                {{if $isSelf}}disabled{{else}}
                hx-get="/admin/users/{{$u.ID}}/confirm-toggle?action=active"
                hx-target="#modal"
                hx-trigger="click"
                onclick="event.preventDefault()"{{end}}>
            <span class="text-xs">{{if $u.IsActive}}Aktiv{{else}}Inaktiv{{end}}</span>
        </label>
    </td>
    <td>
        <label class="label cursor-pointer gap-2 justify-start p-0">
            <input type="checkbox" class="toggle toggle-sm toggle-warning"
                {{if $u.SpendingLimitDisabled}}checked{{end}}
                hx-get="/admin/users/{{$u.ID}}/confirm-toggle?action=spending-limit"
                hx-target="#modal"
                hx-trigger="click"
                onclick="event.preventDefault()">
            <span class="text-xs">{{if $u.SpendingLimitDisabled}}Aufgehoben{{else}}Aktiv{{end}}</span>
        </label>
    </td>
    <td>
        <button class="btn btn-primary btn-xs"
            hx-get="/admin/users/{{$u.ID}}/deposit"
            hx-target="#modal">Einzahlung</button>
    </td>
</tr>
{{end}}
