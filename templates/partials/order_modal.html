{{define "order-modal"}}
<div class="modal modal-open" onclick="if(event.target===this){this.parentElement.style.display='none';this.remove();}">
    <div class="modal-box max-w-sm">
        <h3 class="font-bold text-lg">{{.Item.Name}}</h3>

        <div id="order-error" class="alert alert-error mt-3 hidden">
            <span id="order-error-msg"></span>
        </div>
        <p class="text-sm text-base-content/60">
            {{if .User.IsBarteamer}}{{formatCents .Item.PriceBarteamer}}{{else}}{{formatCents .Item.PriceHelfer}}{{end}} pro Stück
        </p>

        <div class="flex items-center justify-between mt-4">
            <div class="join">
                <button type="button" class="btn btn-outline join-item" onclick="changeQty(-1)">−</button>
                <input type="number" id="order-qty" value="1" min="1" max="{{.MaxQuantity}}"
                    class="input join-item w-16 text-center" onchange="updateTotal()">
                <button type="button" class="btn btn-outline join-item" onclick="changeQty(1)">+</button>
            </div>
            <span class="text-lg font-semibold" id="order-total">{{if .User.IsBarteamer}}{{formatCents .Item.PriceBarteamer}}{{else}}{{formatCents .Item.PriceHelfer}}{{end}}</span>
        </div>

        <div class="modal-action">
            <button class="btn btn-ghost" onclick="this.closest('.modal').parentElement.style.display='none';this.closest('.modal').remove();">Abbrechen</button>
            <button class="btn btn-primary" id="order-confirm-btn"
                hx-post="/menu/order"
                hx-vals='js:{"item_id": "{{.Item.ID}}", "quantity": document.getElementById("order-qty").value}'
                hx-target="#modal"
                hx-headers='{"X-CSRF-Token": "{{.CSRFToken}}"}'>
                Bestellen
            </button>
        </div>
    </div>
</div>

<script>
(function() {
    var unitPrice = {{if .User.IsBarteamer}}{{.Item.PriceBarteamer}}{{else}}{{.Item.PriceHelfer}}{{end}};
    var maxQty = {{.MaxQuantity}};
    var qtyInput = document.getElementById('order-qty');
    var totalEl = document.getElementById('order-total');

    // Show the modal container.
    document.getElementById('modal').style.display = '';

    function formatCents(cents) {
        var negative = cents < 0;
        if (negative) cents = -cents;
        var euros = Math.floor(cents / 100);
        var rest = String(cents % 100);
        if (rest.length < 2) rest = '0' + rest;
        return (negative ? '-' : '') + euros + ',' + rest + ' EUR';
    }

    window.changeQty = function(delta) {
        var val = parseInt(qtyInput.value) || 1;
        val = Math.max(1, Math.min(maxQty, val + delta));
        qtyInput.value = val;
        updateTotal();
    };

    window.updateTotal = function() {
        var val = parseInt(qtyInput.value) || 1;
        val = Math.max(1, Math.min(maxQty, val));
        qtyInput.value = val;
        totalEl.textContent = formatCents(unitPrice * val);
    };

    // Handle error responses inline in the modal.
    var btn = document.getElementById('order-confirm-btn');
    btn.addEventListener('htmx:beforeSwap', function(evt) {
        if (evt.detail.xhr.status >= 400) {
            evt.detail.shouldSwap = false;
            var errDiv = document.getElementById('order-error');
            var errMsg = document.getElementById('order-error-msg');
            var tmp = document.createElement('div');
            tmp.innerHTML = evt.detail.xhr.responseText;
            var span = tmp.querySelector('span');
            errMsg.textContent = span ? span.textContent : 'Ein Fehler ist aufgetreten';
            errDiv.classList.remove('hidden');
        }
    });
})();
</script>
{{end}}
