{{define "kiosk-cancel-modal"}}
<div class="modal modal-open" onclick="if(event.target===this){this.parentElement.style.display='none';this.remove();}">
    <div class="modal-box">
        <h3 class="font-bold text-lg">Buchung stornieren?</h3>
        <p class="py-4">
            {{.Transaction.UserName}}: {{if .Transaction.ItemTitle}}{{deref .Transaction.ItemTitle}}{{else if .Transaction.Description}}{{deref .Transaction.Description}}{{end}}
            — {{formatCents .Transaction.Amount}}
        </p>
        <div class="modal-action">
            <button class="btn btn-ghost" onclick="this.closest('.modal').parentElement.style.display='none';this.closest('.modal').remove();">Abbrechen</button>
            <button class="btn btn-error"
                    hx-post="/kiosk/transactions/{{.Transaction.ID}}/cancel"
                    hx-target="#kiosk-history-list"
                    hx-swap="outerHTML">
                Stornieren
            </button>
        </div>
    </div>
</div>

<script>
(function() {
    document.getElementById('modal').style.display = '';
})();
</script>
{{end}}
